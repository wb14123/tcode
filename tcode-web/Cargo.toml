[package]
name = "tcode-web"
version.workspace = true
edition = "2024"

[dependencies]
anyhow = "1"
axum = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "net"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["io-util", "sync", "time"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
