[package]
name = "tcode"
version = "0.1.0"
edition = "2024"

[dependencies]
llm-rs = { path = "../llm-rs" }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
tokio-stream = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive", "env"] }
anyhow = "1"
futures = "0.3"
bytes = "1"
